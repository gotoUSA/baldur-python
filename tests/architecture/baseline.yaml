# Architectural fitness function baselines.
#
# Each top-level key matches the `rule_key` argument used by a per-rule test
# in `tests/architecture/`. Entries are { file, symbol?, count?, reason,
# ticket, target_remove_by? } records:
#   - `file`: POSIX-style path relative to project root.
#   - `symbol` (optional): the drift-stable enclosing-scope qualname (CPython
#     `__qualname__` semantics — `<module>`, `Class.method`,
#     `outer.<locals>.inner`). When present, the match keys on (file, symbol),
#     NOT a line number, so unrelated edits above a baselined symbol no longer
#     break the gate (impl doc 534). When absent, the whole file is allowlisted
#     for this rule (infinite allowance).
#   - `count` (optional, default 1): the allowed number of violation
#     occurrences for that (file, symbol). A new occurrence pushing the live
#     count past this threshold regresses; this closes the multi-site blind
#     spot the pre-534 line keying carried.
#   - `reason`: free-text explaining why the violation is accepted.
#   - `ticket`: tracking reference (OOS row, impl doc, etc.).
#   - `target_remove_by` (optional): planned removal milestone.
#
# Entries within each rule's list SHOULD be sorted by (file, symbol) ascending
# for stable diffs and minimal merge conflicts.
#
# Improvements (entries that no longer match a real violation) are silently
# accepted; per-rule tests print an INFO message asking for a baseline refresh.

