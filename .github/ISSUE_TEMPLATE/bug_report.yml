name: Bug report
description: Report incorrect or unexpected behavior in Baldur.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail to reproduce.
        For security vulnerabilities, do NOT use this form — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest code, config, or sequence of steps that reproduces the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Baldur version
      description: Output of `pip show baldur` (or the installed version string).
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Python version, framework (Django / Flask / FastAPI), Redis / Celery if relevant, OS.
    validations:
      required: false
