<!DOCTYPE html>
<!--
  Baldur Admin Web Console (impl doc 536).

  Self-contained: inline <style> and <script> only — no third-party scripts,
  no external assets (429 zero-new-runtime-dependency constraint). Served by
  the stdlib admin server at GET /. The handler (console/handler.py) substitutes
  three per-request placeholders before serving:
    - the v1.0 PRO panel-visibility map (D8/D9), into window.__BALDUR_PANELS__
    - the non-gating entitlement status string (D8)
    - the per-request CSP nonce on every <script> tag (D12)

  All API JSON is rendered with textContent (never innerHTML) — DOM-XSS safe.
  A global error boundary keeps one panel's failure from blanking the console.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baldur Admin Console</title>
  <style>
    :root {
      --bg: #0f1419; --panel: #1a212b; --border: #2b3440; --text: #d7dde4;
      --muted: #8a97a5; --accent: #4ea1f3; --danger: #f3614e; --ok: #5fcf80;
      --warn: #f3c14e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 16px; padding: 12px 20px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .spacer { flex: 1; }
    .key-entry { display: flex; align-items: center; gap: 6px; }
    .key-entry input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 6px 10px; width: 220px; font: inherit;
    }
    button {
      background: var(--border); color: var(--text); border: none;
      border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
    }
    button:hover { background: #354150; }
    button.danger { background: #4a2620; color: var(--danger); }
    button.danger:hover { background: #5e2e26; }
    button.primary { background: var(--accent); color: #06121f; font-weight: 600; }
    #banner {
      display: none; padding: 8px 20px; background: #3a2e12; color: var(--warn);
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    #grid {
      display: grid; gap: 16px; padding: 20px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
    }
    .panel-head {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .panel-head h2 { font-size: 14px; margin: 0; font-weight: 600; flex: 1; }
    .tag {
      font-size: 11px; padding: 1px 7px; border-radius: 10px;
      background: #233; color: var(--accent); text-transform: uppercase;
      /* Status badges must never break mid-word (e.g. a table cell with
         overflow-wrap:anywhere would otherwise split "PENDING"). */
      white-space: nowrap;
    }
    .tag.pro { background: #2d2438; color: #c08ef3; }
    .tag.ok { background: #1e3a28; color: var(--ok); }
    .tag.warn { background: #3a3312; color: var(--warn); }
    .tag.danger { background: #3a1f1c; color: var(--danger); }
    .panel-body { padding: 12px 14px; }
    pre {
      margin: 0; max-height: 240px; overflow: auto; font-size: 12px;
      color: var(--muted); white-space: pre-wrap; word-break: break-word;
    }
    /* Structured key-value render (D1) — reuses the scrollable pre container. */
    .kv-row { display: flex; gap: 8px; align-items: baseline; padding: 1px 0; }
    .kv-key { color: var(--muted); flex-shrink: 0; }
    .kv-val { color: var(--text); word-break: break-word; }
    /* DLQ drill-down (D2/D3/D5). */
    .panel-drilldown { padding: 10px 14px 12px; border-top: 1px solid var(--border); }
    .drill-title { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    table.dlq-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.dlq-table th {
      text-align: left; color: var(--muted); font-weight: 600; padding: 4px 6px;
    }
    table.dlq-table td {
      padding: 4px 6px; border-top: 1px solid var(--border);
      /* Break long unbreakable ids (Redis composite host:pid:hash:N) so the
         cell wraps instead of widening the table past the panel and clipping
         the right-hand columns. */
      overflow-wrap: anywhere;
    }
    tr.dlq-row { cursor: pointer; }
    tr.dlq-row:hover { background: #222b36; }
    .dlq-pager { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .dlq-pager button:disabled { opacity: 0.4; cursor: default; }
    .dlq-detail { margin-top: 12px; }
    /* Bounded, internally-scrollable list box — a list (DLQ entries, canary
       active rollouts, canary/DLQ history) can accumulate many rows, and a
       wrapped long id makes each row multi-line, so cap the height and scroll
       inside instead of growing the panel off the bottom of the page (mirrors
       the pre max-height pattern). Wraps the table only; a pager, if any, stays
       outside so it remains visible. */
    .list-scroll { max-height: 260px; overflow-y: auto; }
    .dlq-detail-head {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 6px;
    }
    /* DLQ filter row (#540 follow-up). */
    .dlq-filter { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
    .dlq-filter select, .dlq-filter input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 4px 8px; font: inherit; font-size: 12px;
    }
    .dlq-filter input { width: 130px; }
    /* Per-panel freshness + header auto-refresh toggle. */
    .updated { font-size: 11px; color: var(--muted); }
    .autorefresh {
      display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted);
    }
    .panel-actions {
      display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px;
      border-top: 1px solid var(--border);
    }
    .notice { color: var(--danger); font-size: 12px; }
    .spinner { color: var(--muted); font-size: 12px; }
    /* Modal */
    #overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 100;
    }
    #modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; width: 420px; max-width: 92vw;
    }
    #modal h3 { margin: 0 0 10px; font-size: 15px; }
    #modal p { color: var(--muted); font-size: 13px; }
    #modal .unlock-hint, #modal .action-warn {
      background: #3a2e12; color: var(--warn); padding: 8px 10px;
      border-radius: 6px; font-size: 12px; margin: 10px 0;
    }
    #modal input, #modal textarea, #modal select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px; font: inherit;
      margin: 6px 0;
    }
    #modal textarea { min-height: 70px; font-family: monospace; font-size: 12px; }
    /* Structured body-field form (bodyFields): a persistent label + help line
       per field so the explanation stays visible while typing, plus enum
       <select>s that prevent mistyped levels. */
    #modal .field-label { color: var(--text); font-size: 13px; margin: 10px 0 2px; }
    #modal .field-help { color: var(--muted); font-size: 12px; margin: 0; }
    #modal .field-check {
      display: flex; align-items: center; gap: 6px;
      color: var(--text); font-size: 13px; margin: 8px 0;
    }
    #modal .field-check input { width: auto; margin: 0; }
    #modal .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px;
    }
    #modal .modal-result { font-size: 12px; margin-top: 10px; white-space: pre-wrap; }

    /* ===== Triage redesign: status spine + per-panel health weighting ===== */
    :root {
      --mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      --ok-tint: rgba(95,207,128,.12);
      --warn-tint: rgba(243,193,78,.13);
      --danger-tint: rgba(243,97,78,.15);
    }
    body { font-feature-settings: "tnum" 1; }

    /* Status spine: one aggregate health bar under the header. */
    .spine {
      display: flex; align-items: center; gap: 18px; padding: 16px 20px;
      border-bottom: 1px solid var(--border); background: var(--panel);
    }
    .spine.state-ok     { background: linear-gradient(180deg, var(--ok-tint), transparent); }
    .spine.state-warn   { background: linear-gradient(180deg, var(--warn-tint), transparent); }
    .spine.state-danger { background: linear-gradient(180deg, var(--danger-tint), transparent); }
    .spine-led {
      width: 16px; height: 16px; border-radius: 50%; flex: 0 0 auto;
      box-shadow: 0 0 0 4px rgba(255,255,255,.04);
    }
    .state-ok     .spine-led { background: var(--ok); }
    .state-warn   .spine-led { background: var(--warn); }
    .state-danger .spine-led { background: var(--danger); animation: spine-pulse 1.3s ease-in-out infinite; }
    @keyframes spine-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(243,97,78,.55); }
      50%      { box-shadow: 0 0 0 10px rgba(243,97,78,0); }
    }
    @media (prefers-reduced-motion: reduce) { .state-danger .spine-led { animation: none; } }
    .spine-main  { display: flex; flex-direction: column; gap: 3px; }
    .spine-state { font: 600 19px/1 var(--mono); letter-spacing: .07em; }
    .state-ok     .spine-state { color: var(--ok); }
    .state-warn   .spine-state { color: var(--warn); }
    .state-danger .spine-state { color: var(--danger); }
    .spine-sub   { font-size: 12px; color: var(--muted); }
    .spine-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
    .spine-chip  {
      cursor: pointer; font: 12px/1 var(--mono); padding: 6px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      display: flex; gap: 7px; align-items: center;
    }
    .spine-chip .dot   { width: 7px; height: 7px; border-radius: 50%; }
    .spine-chip.danger { border-color: #5e2e26; }
    .spine-chip.danger .dot { background: var(--danger); }
    .spine-chip.warn .dot   { background: var(--warn); }
    .spine-chip:hover  { border-color: var(--muted); }
    .spine-chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Panel health weighting: trouble rises and brightens, calm recedes. */
    #grid .panel[data-health="ok"]       { opacity: .78; }
    #grid .panel[data-health="ok"]:hover { opacity: 1; }
    #grid .panel[data-health="none"]     { opacity: .88; }
    #grid .panel[data-health="warn"]     { box-shadow: inset 4px 0 0 var(--warn); opacity: 1; }
    #grid .panel[data-health="danger"]   { box-shadow: inset 4px 0 0 var(--danger); border-color: #5e2e26; opacity: 1; }
    .panel.flash { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Dashboard hero: full-width at-a-glance readout. */
    #grid .panel.hero { grid-column: 1 / -1; opacity: 1; }
    .hero-top  { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .hero-pill {
      font: 600 12px/1 var(--mono); letter-spacing: .09em; padding: 7px 13px;
      border-radius: 20px; text-transform: uppercase;
    }
    .hero-pill.ok     { background: var(--ok-tint);     color: var(--ok); }
    .hero-pill.warn   { background: var(--warn-tint);   color: var(--warn); }
    .hero-pill.danger { background: var(--danger-tint); color: var(--danger); }
    .hero-ts   { font: 11px/1 var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .hero-tiles{ display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
    .tile { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 13px 15px; }
    .tile .lbl { font: 600 10px/1 var(--mono); letter-spacing: .13em; text-transform: uppercase; color: var(--muted); }
    .tile .num { font: 600 30px/1.1 var(--mono); margin-top: 9px; color: var(--text); }
    .tile.warn .num   { color: var(--warn); }
    .tile.danger .num { color: var(--danger); }
    .tile.ok .num     { color: var(--ok); }
    .tile.accent .num { color: var(--accent); }
    .tile .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .hero-foot { margin-top: 13px; font: 12px/1.4 var(--mono); color: var(--muted); }
    .hero-foot b { color: var(--text); font-weight: 600; }

    /* Circuit Breakers: per-service rows. */
    .cb-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border); }
    .cb-row:first-child { border-top: none; }
    .cb-name  { font: 13px/1 var(--mono); color: var(--text); flex: 1; }
    .cb-right { display: flex; align-items: center; gap: 10px; }
    .cb-fail  { font: 11px/1 var(--mono); color: var(--muted); }

    /* DLQ stats: mini tiles per status. */
    .mini-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mini-tile { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; }
    .mini-tile .lbl  { font: 600 9px/1 var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .mini-tile .mnum { font: 600 20px/1.1 var(--mono); margin-top: 6px; color: var(--text); }
    .mini-tile.warn .mnum   { color: var(--warn); }
    .mini-tile.danger .mnum { color: var(--danger); }
    .mini-tile.ok .mnum     { color: var(--ok); }
    .dlq-rec { margin-top: 9px; font: 11px/1 var(--mono); color: var(--muted); }

    /* Action buttons colored by consequence (green = recover, red = destructive
       reserved, gray = routine). Permission gating (typed-confirm) is separate. */
    .panel-actions button.btn-recover { background: #1e3a28; color: var(--ok); }
    .panel-actions button.btn-recover:hover { background: #244a31; }
    .panel-actions button.btn-danger  { background: #4a2620; color: var(--danger); }
    .panel-actions button.btn-danger:hover { background: #5e2e26; }

    /* Tables (DLQ + Canary share .dlq-table): keep code-like ids on one line and
       scroll the bounded list box horizontally instead of stacking them. */
    table.dlq-table td { white-space: nowrap; overflow-wrap: normal; }
    table.dlq-table td:first-child { font-family: var(--mono); }
    .list-scroll { overflow-x: auto; }
    /* DLQ gets a second column of room only when it has a backlog. */
    #grid .panel[data-panel-id="dlq"][data-health="danger"],
    #grid .panel[data-panel-id="dlq"][data-health="warn"] { grid-column: span 2; }
    /* Canary widens to a second column when it has rollouts, so the active /
       history drilldown tables (id + config_type + state + stage) don't clip.
       Keyed on data-populated, not health, so a normal rollout doesn't elevate
       the spine. */
    #grid .panel[data-panel-id="canary"][data-populated="1"] { grid-column: span 2; }
  </style>
</head>
<body>
  <header>
    <h1>Baldur Admin Console</h1>
    <span class="spacer"></span>
    <label class="autorefresh">
      <input type="checkbox" id="autorefresh-toggle" /> Auto-refresh
    </label>
    <div class="key-entry">
      <label for="admin-key" class="spinner">Admin key</label>
      <input id="admin-key" type="password" autocomplete="off"
             placeholder="paste key (non-localhost)" />
      <button id="save-key">Save</button>
    </div>
  </header>

  <div id="banner"></div>
  <div id="grid"></div>

  <div id="overlay">
    <div id="modal" role="dialog" aria-modal="true">
      <h3 id="modal-title"></h3>
      <div id="modal-content"></div>
      <div class="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm" class="primary">Confirm</button>
      </div>
      <div id="modal-result" class="modal-result"></div>
    </div>
  </div>

  <!-- Server-injected bootstrap data (D8/D9/D12). -->
  <script nonce="__BALDUR_CSP_NONCE__">
    window.__BALDUR_PANELS__ = __BALDUR_PANELS_JSON__;
    window.__BALDUR_ENTITLEMENT__ = "__BALDUR_ENTITLEMENT__";
  </script>

  <script nonce="__BALDUR_CSP_NONCE__">
  "use strict";
  // --- Global error boundary (D3) -----------------------------------------
  // Safe DOM rendering stops XSS but not a TypeError from an unexpected data
  // shape, which in vanilla JS can blank the whole page. Catch uncaught errors
  // and rejections, show a non-fatal notice, and keep the rest interactive.
  function showGlobalError(where, message) {
    var banner = document.getElementById("banner");
    banner.style.display = "block";
    banner.textContent =
      "Console internal error" + (where ? " (" + where + ")" : "") +
      ": " + message + " — other panels remain usable.";
  }
  window.addEventListener("error", function (e) {
    showGlobalError("", (e && e.message) || "script error");
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e && e.reason;
    showGlobalError("", (r && r.message) || String(r) || "promise rejection");
  });

  // --- Key storage (D12) ---------------------------------------------------
  var KEY_STORE = "baldur_admin_key";
  function getKey() { return sessionStorage.getItem(KEY_STORE) || ""; }
  function setKey(v) {
    if (v) { sessionStorage.setItem(KEY_STORE, v); }
    else { sessionStorage.removeItem(KEY_STORE); }
  }

  // --- Fetch with key + abort timeout (D11/D12) ----------------------------
  // The console is used precisely when the system may be wedged, so every
  // request carries an AbortController timeout — a stalled downstream would
  // otherwise hang the browser indefinitely on the default fetch timeout.
  var FETCH_TIMEOUT_MS = 5000;
  function adminFetch(path, opts) {
    opts = opts || {};
    var controller = new AbortController();
    var timer = setTimeout(function () { controller.abort(); }, FETCH_TIMEOUT_MS);
    var headers = Object.assign({}, opts.headers || {});
    var key = getKey();
    if (key) { headers["X-Baldur-Admin-Key"] = key; }
    return fetch(path, Object.assign({}, opts, {
      headers: headers, signal: controller.signal
    })).finally(function () { clearTimeout(timer); });
  }

  // --- Panel definitions ---------------------------------------------------
  // pro:true panels are gated on window.__BALDUR_PANELS__[id] (registry
  // presence). Action risk mirrors the server route's permission level (D10):
  //   risk "operator" -> simple confirm; risk "admin" -> typed confirmation
  //   + BALDUR_ADMIN_UNLOCK=1 hint.
  var PANELS = [
    { id: "dashboard", title: "Dashboard", pro: false,
      status: "/dashboard/summary", bodyRender: "dashboard" },
    { id: "circuit_breaker", title: "Circuit Breakers", pro: false,
      status: "/control/status", bodyRender: "circuit_breaker",
      actions: [
        { label: "Reset breaker", path: "/control/reset/{service_name}",
          method: "POST", risk: "admin", param: "service_name" },
        { label: "Block (force open)", path: "/control/block/{service_name}",
          method: "POST", risk: "admin", param: "service_name",
          bodyFields: [
            { key: "reason", label: "Reason (optional)", type: "text",
              placeholder: "why this breaker is being forced open",
              help: "Recorded in the audit trail. Blank = a default note." },
            { key: "ttl_minutes", label: "Auto-clear after (minutes, optional)",
              type: "number", placeholder: "90",
              help: "Block lifts automatically after N minutes. "
                + "Blank = server default (90)." }
          ] },
        { label: "Allow (force closed)", path: "/control/allow/{service_name}",
          method: "POST", risk: "admin", param: "service_name",
          bodyFields: [
            { key: "reason", label: "Reason (optional)", type: "text",
              placeholder: "why traffic is being forced through despite failures",
              help: "Recorded in the audit trail. Blank = a default note." }
          ] }
      ] },
    { id: "system", title: "System Control", pro: false, status: "/system/status",
      actions: [
        { label: "Enable automation", path: "/system/enable", method: "POST",
          risk: "admin" },
        { label: "Disable (kill switch)", path: "/system/disable", method: "POST",
          risk: "admin",
          bodyField: { key: "reason", label: "Reason (required)", required: true,
            placeholder: "why automation is being stopped "
              + "(recorded in the audit trail)" } },
        { label: "Dry-run: enable", path: "/system/dry-run/enable", method: "POST",
          risk: "admin" },
        { label: "Dry-run: disable", path: "/system/dry-run/disable",
          method: "POST", risk: "admin", body: true,
          bodyDefault: '{"confirm": true}' }
      ] },
    { id: "emergency", title: "Emergency", pro: true, status: "/emergency/status",
      actions: [
        { label: "Trigger", path: "/emergency/trigger", method: "POST",
          risk: "admin",
          bodyFields: [
            { key: "level", label: "Level", type: "select", default: "LEVEL_3",
              help: "Severity. L1 blocks non-essential, L2 throttles standard "
                + "to 10%, L3 caps critical at 50%.",
              options: [
                { value: "LEVEL_1", label: "LEVEL_1 — minor (non-essential blocked)" },
                { value: "LEVEL_2", label: "LEVEL_2 — moderate (standard at 10%)" },
                { value: "LEVEL_3", label: "LEVEL_3 — severe (critical at 50%)" }
              ] },
            { key: "reason", label: "Reason (required)", type: "text", required: true,
              placeholder: "e.g. payment gateway outage",
              help: "Recorded in the audit trail." },
            { key: "duration_minutes", label: "Duration (minutes, optional)",
              type: "number", placeholder: "30",
              help: "Auto-release after N minutes. Blank = stays until manual release." },
            { key: "override_kill_switch", label: "Override kill switch",
              type: "checkbox",
              caption: "Activate even while the kill switch is engaged",
              help: "Leave off unless you intend to bypass the global kill switch." }
          ] },
        { label: "Release", path: "/emergency/release", method: "POST",
          risk: "admin",
          bodyFields: [
            { key: "reason", label: "Reason (optional)", type: "text",
              placeholder: "why emergency is being lifted",
              help: "Recorded in the audit trail." },
            { key: "force", label: "Force release", type: "checkbox",
              caption: "Bypass the recovery gate",
              help: "If recovery rules block the release, force it through. Use with care." }
          ] },
        { label: "Gradual recovery", path: "/emergency/gradual-recovery",
          method: "POST", risk: "admin",
          bodyFields: [
            { key: "target_level", label: "Target level", type: "select",
              default: "NORMAL",
              help: "Ramp traffic back up toward this level in stages instead of "
                + "all at once (requires an active emergency).",
              options: [
                { value: "NORMAL", label: "NORMAL — full recovery (all traffic restored)" },
                { value: "LEVEL_1", label: "LEVEL_1 — partial: standard restored, non-essential stays blocked" },
                { value: "LEVEL_2", label: "LEVEL_2 — partial: standard still at 10%, non-essential blocked" }
              ] }
          ] },

    // Runtime Config editor (662). PRO-only (gated on runtime_config_manager).
    // status + the Reset action both stay under /config so the panel's status
    // domain == action domain (G44). All per-section editing happens in the
