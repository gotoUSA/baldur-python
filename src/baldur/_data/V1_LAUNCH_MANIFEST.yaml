# V1.0 Launch Manifest — authoritative tier/default-enable contract.
#
# Single source of truth mapping every Pydantic `*enabled*` / `enable_*`
# boolean field under `src/baldur/settings/` to its v1.0 launch tier and the
# expected `Field(default=...)` value at v1.0 launch.
#
# Enforced by `tests/unit/architecture/test_v1_default_enable.py` (per impl
# doc 527 D5). New `*enabled*` boolean fields require a manifest entry —
# enumeration is strict. Default drift between code and manifest fails CI.
#
# Schema (per entry):
#   module:   settings module filename, e.g. `compliance.py`
#   class:    Pydantic class name owning the field (BaseSettings or nested
#             BaseModel sub-config)
#   field:    bool field name
#   default:  expected Pydantic `Field(default=...)` value at v1.0 launch
#   tier:     Core | v1.0 | Deferred | Dormant
#   env_var:  operator-facing env-var name computed from `env_prefix` +
#             field name (uppercase). Nested BaseModel fields use the
#             `env_nested_delimiter="__"` separator from `settings/base.py`.
#
# Tier semantics:
#   Core    — OSS infrastructure / always-on resilience primitives. Default
#             reflects current OSS launch state (may be True or False).
#   v1.0    — PRO v1.0 launch-set feature (per `memory/pro-launch-strategy.md`
#             Revision 5, 2026-04-18). Default reflects v1.0 launch state.
#   Deferred — PRO feature built but held out of the v1.0 launch set (per
#             `memory/pro-launch-strategy.md` Revision 5, 2026-04-18).
#             Defaults False at v1.0 launch. Each feature is promoted
#             individually when prioritized — its own impl doc flips its
#             default (tracked in OOS_INDEX.md). There is no single bulk
#             "v1.1" release event; the deferred set is a reprioritizable
#             backlog, not a dated release.
#   Dormant — AI-tuning / Compliance-Security cluster per
#             `memory/tier-reclassification-2026-03-28.md`. Defaults False at
#             v1.0 launch. No marketing surface; no runbooks; opt-in only.
#
# Override path: any operator can flip a default at runtime via the
# `env_var` shown. `bootstrap.py` emits one WARNING per process per
# Deferred/Dormant field with a True resolved value (suppress via
# `BALDUR_SUPPRESS_TIER_WARNING=true`).

